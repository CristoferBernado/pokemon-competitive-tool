<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bidoof Lab's{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <!-- Custom menu hover effect -->
    <style>
        .menu-hover-link {
            transition: color 0.2s ease-in-out, transform 0.2s ease-in-out;
        }
        .menu-hover-link:hover {
            color: #ffdf00 !important; /* Golden Neon */
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.8), 0 0 16px rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }
    </style>
    
</head>
<body class="d-flex flex-column min-vh-100 pokedex-body">
    <div id="page-loading" class="page-loading d-none" aria-live="polite" aria-busy="false" role="status">
        <div class="page-loading-backdrop"></div>
        <div class="page-loading-panel">
            <div class="pokeball-container">
                <div class="pokeball"></div>
            </div>
            <p class="page-loading-text mb-0 mt-3">{{ t('Buscando Pokémon…') }}</p>
        </div>
    </div>

    <!-- Kalos Pokedex Top Bezel -->
    <div class="pokedex-bezel top">
        <div class="bezel-inner">
            <div class="cutout-top"></div>
        </div>
    </div>

    <div class="pokedex-device-body flex-grow-1 d-flex flex-column">
        <nav class="navbar navbar-dark flex-shrink-0 pokedex-navbar">
            <div class="container position-relative">
                <!-- Hamburger Menu on the left or keep it on the right? The html had it on the right initially -->
                <a class="navbar-brand d-flex align-items-center gap-2 m-0" href="{{ url_for('main.index') }}" style="font-family: 'Flexo-Bold', 'Flexo', sans-serif; font-weight: bold; text-transform: uppercase;">
                    <img src="{{ url_for('static', filename='img/favicon.png') }}" alt="Logo" width="30" height="30" class="d-inline-block align-text-top rounded-circle"> BIDOOF LAB'S
                </a>
                
                <!-- We need a spacer for the left if brand is absolute, but actually the right items are float-end -->
                <div class="d-flex align-items-center ms-auto">
                    <button id="theme-toggle" class="light-dark-toggle me-3" title="Alternar Tema">
                        <span class="indicator light sprite-solrock"></span>
                        <span class="indicator dark sprite-lunatone"></span>
                    </button>
                    <div class="dropdown me-3">
                        <button class="btn btn-sm btn-outline-light dropdown-toggle font-monospace fw-bold" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="min-width: 50px;">
                            {{ 'PT' if g.lang == 'pt' else 'EN' }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li><a class="dropdown-item {% if g.lang == 'pt' %}active{% endif %}" href="{{ url_for('main.set_language', lang='pt') }}">Português (PT)</a></li>
                            <li><a class="dropdown-item {% if g.lang == 'en' %}active{% endif %}" href="{{ url_for('main.set_language', lang='en') }}">English (EN)</a></li>
                        </ul>
                    </div>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>

                <div class="collapse navbar-collapse mt-3" id="navbarNav">
                    <ul class="navbar-nav flex-row flex-wrap gap-3 ms-auto mb-3 justify-content-center justify-content-lg-end w-100">
                        <li class="nav-item">
                            <a class="nav-link text-white fw-bold menu-hover-link" href="{{ url_for('main.index') }}">
                                <i class="bi bi-house-door-fill me-1"></i> {{ t('Início') }}
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white fw-bold menu-hover-link" href="{{ url_for('main.pokedex') }}">
                                <i class="bi bi-search me-1 text-warning"></i> {{ t('Pokédex') }}
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white fw-bold menu-hover-link" href="{{ url_for('main.teambuilder') }}">
                                <i class="bi bi-tools me-1"></i> {{ t('Teambuilder') }}
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white fw-bold menu-hover-link" href="{{ url_for('main.damage_calculator') }}">
                                <i class="bi bi-calculator me-1"></i> {{ t('Calculadora de Dano') }}
                            </a>
                        </li>
                    </ul>

                </div>
            </div>
        </nav>

        <div class="pokedex-screen flex-grow-1">
            <main class="container py-4">
                {% block content %}{% endblock %}
            </main>
        </div>

        <footer class="site-footer text-white text-center mt-auto pokedex-footer">
            <div class="container py-3">
                <p class="mb-0 small">{{ t('footer_copyright')|safe }}</p>
            </div>
        </footer>
    </div>

    <!-- Kalos Pokedex Bottom Bezel -->
    <div class="pokedex-bezel bottom">
        <div class="bezel-inner">
            <div class="cutout-bottom"></div>
            <div class="charge-port"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
