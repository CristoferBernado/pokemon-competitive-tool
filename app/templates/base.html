<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pokémon Competitive Site{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body class="d-flex flex-column min-vh-100">
    <div id="page-loading" class="page-loading d-none" aria-live="polite" aria-busy="false" role="status">
        <div class="page-loading-backdrop"></div>
        <div class="page-loading-panel">
            <div class="pokeball-container">
                <div class="pokeball"></div>
            </div>
            <p class="page-loading-text mb-0 mt-3">Buscando Pokémon…</p>
        </div>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger flex-shrink-0">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">
                🎮 Pokémon Competitive
            </a>
            <div class="d-flex align-items-center">
                <button id="theme-toggle" class="theme-toggle-btn me-2" title="Alternar Tema">
                    <span class="theme-icon">🌓</span>
                </button>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <form class="d-flex ms-auto flex-grow-1 flex-lg-grow-0 gap-2 navbar-search-form site-search-form" action="{{ url_for('main.search') }}" method="get">
                    <input class="form-control flex-grow-1" type="search" name="q" placeholder="Nome, # ou tipo…" aria-label="Buscar" autocomplete="off">
                    <button class="btn btn-light" type="submit">Buscar</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container mt-4 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer bg-dark text-white text-center mt-auto">
        <div class="container py-4">
            <p class="mb-0 small">&copy; 2024 Pokémon Competitive Site — Dados fornecidos por <a class="link-light text-decoration-underline" href="https://pokeapi.co/" rel="noopener noreferrer" target="_blank">PokeAPI</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
