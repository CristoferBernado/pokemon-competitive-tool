{% extends "base.html" %}

{% block title %}Bidoof Lab's - {{ t('Apresentação') }}{% endblock %}

{% block content %}
<style>
    /* Styling for the floating sprites ecosystem */
    #sprite-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
    }

    /* Liquid Glass Bubble Effect */
    .glass-bubble {
        position: absolute;
        bottom: -150px; /* Start way below the view */
        width: 140px;
        height: 140px;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        
        /* Performance optimizations */
        will-change: transform, border-radius, opacity;
        transform: translateZ(0);
        
        /* Glassmorphism Ultra Realistic */
        background: radial-gradient(150% 150% at 30% 20%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 30%, rgba(135,206,250,0.05) 100%);
        backdrop-filter: blur(8px) saturate(120%);
        -webkit-backdrop-filter: blur(8px) saturate(120%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        
        /* Multiple insets to create 3D spherical volume, thick edges, and environment reflection */
        box-shadow: 
            inset -10px -20px 30px rgba(255, 255, 255, 0.3), 
            inset 10px 10px 20px rgba(255, 255, 255, 0.5),
            inset 0 0 15px rgba(135, 206, 250, 0.2), /* Light blue inner reflection */
            0 15px 35px rgba(0, 0, 0, 0.2),
            0 0 15px rgba(255, 255, 255, 0.1);
            
        /* Morphing Blob Initial Shape */
        border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        
        /* Two animations: float up (varies) and shape morph (fixed duration) */
        animation-name: floatUpAndFade, morphBubble;
        animation-timing-function: linear, ease-in-out;
        animation-iteration-count: infinite, infinite;
        animation-direction: normal, alternate;
    }

    /* Glare/Highlight Reflex on the Bubble */
    .glass-bubble::before {
        content: '';
        position: absolute;
        top: 15px;
        left: 20px;
        width: 35px;
        height: 15px;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 50%;
        transform: rotate(-30deg);
        filter: blur(2px);
        pointer-events: none;
        z-index: 10;
        opacity: 0.9;
    }
    
    .glass-bubble::after {
        content: '';
        position: absolute;
        bottom: 15px;
        right: 20px;
        width: 25px;
        height: 8px;
        background: rgba(135, 206, 250, 0.6);
        border-radius: 50%;
        transform: rotate(-30deg);
        filter: blur(2px);
        pointer-events: none;
        z-index: 10;
    }

    .bubble-sprite {
        width: 75%;
        height: 75%;
        object-fit: contain;
        filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.4));
        will-change: transform;
        transform: translateZ(0);
        animation: gentleWobble 4s ease-in-out infinite alternate;
    }

    @keyframes morphBubble {
        0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        50% { border-radius: 60% 40% 50% 50% / 50% 40% 60% 50%; }
        100% { border-radius: 50% 50% 45% 55% / 55% 45% 50% 50%; }
    }

    @keyframes gentleWobble {
        from { transform: translateY(-4px) rotate(-3deg); }
        to { transform: translateY(4px) rotate(3deg); }
    }

    @keyframes floatUpAndFade {
        0% {
            transform: translateY(0) scale(0.8);
            opacity: 0;
        }
        20% {
            opacity: 0.8;
            transform: translateY(-20vh) scale(1);
        }
        80% {
            opacity: 0.8;
            transform: translateY(-80vh) scale(1);
        }
        100% {
            transform: translateY(-110vh) scale(0.8);
            opacity: 0;
        }
    }

    /* Fairy Dust Effect */
    #fairy-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 1; /* Below content, above or mixing with sprites */
        pointer-events: none;
    }

    .fairy-dust {
        position: absolute;
        bottom: -30px;
        border-radius: 50%;
        /* Magical light blue/white glow */
        background: radial-gradient(circle, #ffffff 0%, #87cefa 50%, rgba(135,206,250,0) 100%);
        box-shadow: 0 0 12px 4px rgba(135, 206, 250, 0.6);
        opacity: 0;
        will-change: transform, opacity;
        transform: translateZ(0);
        animation: fairyFloat linear infinite;
    }

    @keyframes fairyFloat {
        0% {
            transform: translateY(0) translateX(0) scale(0.3) translateZ(0);
            opacity: 0;
        }
        20% {
            opacity: 0.9;
            transform: translateY(-20vh) translateX(15px) scale(1) translateZ(0);
        }
        50% {
            transform: translateY(-50vh) translateX(-15px) scale(1.3) translateZ(0);
        }
        80% {
            opacity: 0.9;
            transform: translateY(-80vh) translateX(15px) scale(1) translateZ(0);
        }
        100% {
            transform: translateY(-110vh) translateX(-10px) scale(0.3) translateZ(0);
            opacity: 0;
        }
    }

    /* Mobile Performance Fallbacks */
    @media (max-width: 768px) {
        .glass-bubble {
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            /* Simplify shadows to save GPU on mobile */
            box-shadow: inset 5px 5px 15px rgba(255, 255, 255, 0.4), 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .glass-bubble::before, .glass-bubble::after {
            /* Keep glares but reduce blur computation */
            filter: blur(0px);
            opacity: 0.5;
        }
        .bubble-sprite {
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }
        .fairy-dust {
            box-shadow: 0 0 6px 2px rgba(135, 206, 250, 0.4);
        }
    }

    .landing-content {
        position: relative;
        z-index: 10; /* above the sprites */
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding-bottom: 10vh; /* slightly above vertical center */
    }

    .landing-logo {
        max-width: 400px;
        width: 90%;
        margin-bottom: 20px;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }
    
    [data-theme="dark"] .landing-logo {
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.7));
    }
</style>

<div id="sprite-container"></div>
<div id="fairy-container"></div>

<div class="landing-content h-100 flex-grow-1">
    <img src="{{ url_for('static', filename='img/logo_transparent.png') }}" alt="Bidoof Lab's Logo" class="landing-logo">
    <h1 class="display-5 fw-bold mb-3">{{ t("Bem-vindo ao Bidoof Lab's") }}</h1>
    <p class="lead mb-5 max-w-500">{{ t('Sua ferramenta completa para análise competitiva de Pokémon') }}</p>
    
    <a href="{{ url_for('main.pokedex') }}" class="btn btn-danger btn-lg px-5 py-3 fw-bold shadow-lg rounded-pill" style="font-size: 1.25rem; text-transform: uppercase;">
        {{ t('Entrar') }} <i class="bi bi-box-arrow-in-right ms-2"></i>
    </a>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", () => {
    const isMobile = window.innerWidth <= 768;
    
    // Config: Reduce amounts drastically for mobile clients
    const container = document.getElementById("sprite-container");
    const TOTAL_SPRITES = isMobile ? 5 : 10;
    const MAX_POKEMON_ID = 1025;
    
    for (let i = 0; i < TOTAL_SPRITES; i++) {
        // Create Bubble container
        const bubble = document.createElement("div");
        bubble.className = "glass-bubble";
        
        const img = document.createElement("img");
        // Generate a random Pokemon ID
        const randomId = Math.floor(Math.random() * MAX_POKEMON_ID) + 1;
        
        // Use the official artwork as requested
        img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${randomId}.png`;
        img.className = "bubble-sprite";
        img.loading = "lazy";
        img.decoding = "async"; // Help browser render without blocking thread
        
        bubble.appendChild(img);
        
        // Randomize starting X position (from 2% to 88% of screen width)
        const leftPos = 2 + Math.random() * 88;
        bubble.style.left = `${leftPos}%`;
        
        // Randomize animation duration (float)
        const duration = 12 + Math.random() * 15;
        // Randomize delay
        const delay = Math.random() * 15;
        
        // Apply durations (first is floatUpAndFade, second is morphBubble which is fixed at 6s or random between 4s-8s)
        const morphDuration = 4 + Math.random() * 4;
        bubble.style.animationDuration = `${duration}s, ${morphDuration}s`;
        bubble.style.animationDelay = `${delay}s, 0s`;
        
        // Listen to the end of the float animation cycle to swap the Pokemon!
        bubble.addEventListener('animationiteration', (e) => {
            if (e.animationName === 'floatUpAndFade') {
                const newId = Math.floor(Math.random() * MAX_POKEMON_ID) + 1;
                img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${newId}.png`;
                
                // Shuffle the horizontal position for the next float up
                const newLeftPos = 2 + Math.random() * 88;
                bubble.style.left = `${newLeftPos}%`;
            }
        });
        
        container.appendChild(bubble);
    }

    /* Spawn Fairy Dust Particles */
    const fairyContainer = document.getElementById("fairy-container");
    // Reduce fairy particle count on mobile
    const TOTAL_FAIRIES = isMobile ? 20 : 60; 

    for (let i = 0; i < TOTAL_FAIRIES; i++) {
        const fairy = document.createElement("div");
        fairy.className = "fairy-dust";
        
        // Random size between 4px and 12px
        const size = 4 + Math.random() * 8;
        fairy.style.width = `${size}px`;
        // Must maintain square aspect for perfect circle
        fairy.style.height = `${size}px`; 
        
        // Random horizontal position (0 to 100vw)
        fairy.style.left = `${Math.random() * 100}%`;
        
        // Animation duration (fairies float slightly faster/more erratic than sprites)
        const duration = 8 + Math.random() * 12; 
        const delay = Math.random() * 10;
        
        fairy.style.animationDuration = `${duration}s`;
        fairy.style.animationDelay = `${delay}s`;
        
        fairyContainer.appendChild(fairy);
    }
});
</script>
{% endblock %}
